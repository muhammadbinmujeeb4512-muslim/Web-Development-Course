<!DOCTYPE html>
<html>
    <head>
        <title>Bootstrap Example</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    </head>
    <body>

        <div class="container">
            <h2>Basic Progress Bar</h2>
            <p>To craete a default progress bar, add a .progress class to container element and the progress-bar class to its child element.
                Use the CSS width property to set the width of the progress bar:</p>
                <div class="progress">
                    <div class="progress-bar" style="width:99%">99%</div>
                </div>
        </div>
    </body>
</html>
