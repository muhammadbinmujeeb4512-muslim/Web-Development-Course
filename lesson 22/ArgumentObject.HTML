<!DOCTYPE html>
<html>
    <head>
        <title>Argument Object</title>
    </head>
    <body>
        <p>Finding the largest number with help of Argument Objects</p>
        <p id="result"></p>
        <script>
            function findMax() {
                var i;
                var max = 0;
                for(i = 0; i < arguments.length; i++) {
                    if (arguments[i] > max) {
                        max = arguments[i];

                    }
                }
                return max;
            }

            document.getElementById("result").innerHTML = findMax(4, 6, 7, 7);
        </script>
    </body>
</html>
