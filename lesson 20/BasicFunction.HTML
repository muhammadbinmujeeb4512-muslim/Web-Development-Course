<!DOCTYPE html>
<html>
    <head>
        <title>Basic Function</title>
    </head>
    <body>
        <button onclick="myfunction(2,5)">Execute JS function</button>

        <script>
            function myfunction(x, y)
            {
                if (y=== undefined) {
                    y = 5;
                }
                document.write(x*y);
            }
        </script>
    </body>
</html>
